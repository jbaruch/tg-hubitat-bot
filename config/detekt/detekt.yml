# detekt overrides, layered on detekt's bundled defaults
# (buildUponDefaultConfig = true in build.gradle.kts; the pinned plugin version
# fixes the default ruleset). No baseline and no CI gate during adoption: detekt
# runs on demand only (`./gradlew detekt`). Add project-specific rule tuning here
# as findings are cleaned up; a later PR wires the CI gate once the tree is zero.

style:
  MaxLineLength:
    # Raw strings are JSON fixtures in tests - breaking them mangles the
    # payload for no readability gain.
    excludeRawStrings: true
  ReturnCount:
    # Kotlin guard-clause / early-return style is idiomatic here; the default
    # of 2 fights it. 4 still flags genuinely branchy functions.
    max: 4
